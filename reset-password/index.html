<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password - GETXH</title>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: white;
    }

    .card {
      background: #1e293b;
      padding: 36px 30px;
      border-radius: 12px;
      width: 340px;
      text-align: center;
    }

    .card h2 {
      margin-bottom: 6px;
      font-size: 22px;
    }

    .card p.sub {
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 20px;
    }

    .input-wrap {
      position: relative;
      margin-top: 14px;
    }

    .input-wrap input {
      width: 100%;
      padding: 12px 40px 12px 14px;
      border-radius: 8px;
      border: 1.5px solid #334155;
      background: #0f172a;
      color: white;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-wrap input:focus {
      border-color: #6366f1;
    }

    .toggle-pwd {
      position: absolute;
      right: 11px;
      top: 50%;
      transform: translateY(-50%);
      width: 28px;
      height: 28px;
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #334155;
      transition: color 0.2s, background 0.2s;
    }
    .toggle-pwd:hover { background: rgba(255,255,255,0.07); color: #94a3b8; }

    button {
      width: 100%;
      padding: 13px;
      margin-top: 22px;
      background: #6366f1;
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover:not(:disabled) { background: #4f46e5; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }

    .msg { margin-top: 14px; font-size: 14px; }
    .msg.error { color: #ef4444; }
    .msg.success { color: #22c55e; }

    /* Password rules panel — same as Registerpage */
    .pwd-rules {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 0 12px;
      background: rgba(255,255,255,0.025);
      border-radius: 8px;
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      transition: max-height 0.35s ease, opacity 0.3s ease, padding 0.3s ease, margin-top 0.3s ease;
      margin-top: 0;
    }
    .pwd-rules.visible {
      max-height: 110px;
      opacity: 1;
      padding: 11px 12px;
      margin-top: 8px;
    }
    .rule {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11.5px;
      font-weight: 500;
      color: #f87171;
      transition: color 0.28s ease;
    }
    .rule.valid { color: #4ade80; }
    .rule-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #f87171;
      flex-shrink: 0;
      transition: background 0.28s ease, transform 0.2s ease, box-shadow 0.28s ease;
    }
    .rule.valid .rule-dot {
      background: #4ade80;
      transform: scale(1.2);
      box-shadow: 0 0 6px rgba(74,222,128,0.45);
    }
  </style>
</head>

<body>
  <div class="card">
    <h2>Reset Password</h2>
    <p class="sub">Enter your new password below</p>

    <div class="input-wrap">
      <input type="password" id="password" placeholder="New password"
             oninput="onPasswordInput(this.value)" />
      <div class="toggle-pwd" onclick="togglePwd('password','eyeIcon1')" title="Show/hide password">
        <svg id="eyeIcon1" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
        </svg>
      </div>
    </div>

    <!-- Live password rules — same as Registerpage -->
    <div class="pwd-rules" id="pwdRules">
      <div class="rule" id="rule-minlen">
        <span class="rule-dot"></span>At least 8 characters
      </div>
      <div class="rule" id="rule-maxlen">
        <span class="rule-dot"></span>Maximum 20 characters
      </div>
      <div class="rule" id="rule-upper">
        <span class="rule-dot"></span>First letter must be uppercase
      </div>
    </div>

    <div class="input-wrap" style="margin-top:14px;">
      <input type="password" id="confirm" placeholder="Confirm new password" />
      <div class="toggle-pwd" onclick="togglePwd('confirm','eyeIcon2')" title="Show/hide password">
        <svg id="eyeIcon2" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
        </svg>
      </div>
    </div>

    <button id="resetBtn" onclick="resetPassword()">Update Password</button>

    <div id="msg" class="msg"></div>
  </div>

<script>
  const params  = new URLSearchParams(window.location.search);
  const email   = params.get("email") || "";

  if (!email) {
    document.getElementById("msg").className = "msg error";
    document.getElementById("msg").textContent = "Invalid link. Please start again.";
    document.getElementById("resetBtn").disabled = true;
  }

  function evalRules(pwd) {
    const minLen = pwd.length >= 8;
    const maxLen = pwd.length > 0 && pwd.length <= 20;
    const upper  = /^[A-Z]/.test(pwd);
    setRule("rule-minlen", minLen);
    setRule("rule-maxlen", maxLen);
    setRule("rule-upper",  upper);
    return minLen && maxLen && upper;
  }

  function setRule(id, valid) {
    document.getElementById(id).classList.toggle("valid", valid);
  }

  function onPasswordInput(val) {
    const panel = document.getElementById("pwdRules");
    val.length > 0 ? panel.classList.add("visible") : panel.classList.remove("visible");
    evalRules(val);
  }

  function togglePwd(inputId, iconId) {
    const p      = document.getElementById(inputId);
    const icon   = document.getElementById(iconId);
    const hidden = p.type === "password";
    p.type       = hidden ? "text" : "password";
    icon.innerHTML = hidden
      ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
      : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }

  async function resetPassword() {
    const password = document.getElementById("password").value;
    const confirm  = document.getElementById("confirm").value;
    const msgEl    = document.getElementById("msg");
    const btn      = document.getElementById("resetBtn");

    msgEl.className   = "msg";
    msgEl.textContent = "";

    if (!password) {
      msgEl.className   = "msg error";
      msgEl.textContent = "Enter a new password.";
      return;
    }

    if (!evalRules(password)) {
      document.getElementById("pwdRules").classList.add("visible");
      msgEl.className   = "msg error";
      msgEl.textContent = "Password doesn't meet all requirements.";
      return;
    }

    if (password !== confirm) {
      msgEl.className   = "msg error";
      msgEl.textContent = "Passwords do not match.";
      return;
    }

    btn.disabled    = true;
    btn.textContent = "Updating…";

    try {
      const res  = await fetch("https://backend-for-email-verification-code-production-61a3.up.railway.app/reset-password", {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify({ email, newPassword: password })
      });

      const data = await res.json();

      if (data.success) {
        msgEl.className   = "msg success";
        msgEl.textContent = "Password updated! Redirecting to login…";
        setTimeout(() => {
          window.location.href = "/";
        }, 2000);
      } else {
        msgEl.className   = "msg error";
        msgEl.textContent = data.message || "Failed to update password. Try again.";
        btn.disabled    = false;
        btn.textContent = "Update Password";
      }

    } catch (err) {
      msgEl.className   = "msg error";
      msgEl.textContent = "Cannot reach server. Try again.";
      btn.disabled    = false;
      btn.textContent = "Update Password";
    }
  }
</script>

</body>
</html>
