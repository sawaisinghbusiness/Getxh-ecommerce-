<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>GETXH - Login</title>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

<style>
.material-symbols-outlined { font-variation-settings: 'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 20; font-size: 20px; }
body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(180deg, #f5f7fb 0%, #eef2ff 100%);
}
.form-input-container { position: relative; }
.form-input-container .material-symbols-outlined {
    position: absolute;
    left: 1rem;
    top: 50%;
    transform: translateY(-50%);
    color: #94a3b8;
    pointer-events: none;
    transition: color 0.3s ease;
}
.form-input-container .form-input {
    padding-left: 3rem;
    transition: border-color 0.25s ease, box-shadow 0.25s ease, background-color 0.25s ease, transform 0.2s ease;
}
.form-input-container:focus-within .material-symbols-outlined {
    color: #2563eb;
}
.toggle-password {
    position: absolute;
    right: 0.75rem;
    top: 50%;
    transform: translateY(-50%);
    color: #94a3b8;
    cursor: pointer;
    width: 2rem;
    height: 2rem;
    border-radius: 9999px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background-color 0.2s ease, color 0.2s ease, transform 0.2s ease;
}
.toggle-password:hover {
    color: #334155;
    background: #f1f5f9;
}
.toggle-password:active {
    transform: translateY(-50%) scale(0.96);
}
.toggle-password .material-symbols-outlined { pointer-events: auto; }
.login-card {
    border: 1px solid #e5e7eb;
    border-radius: 1rem;
    background: rgba(255, 255, 255, 0.96);
    box-shadow: 0 24px 60px rgba(15, 23, 42, 0.10);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}
.login-card:hover {
    transform: translateY(-4px) scale(1.01);
    box-shadow: 0 28px 70px rgba(15, 23, 42, 0.12);
}
.primary-button {
    background: #2563eb;
    box-shadow: 0 14px 30px rgba(37, 99, 235, 0.22);
    transition: background-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
}
.primary-button:hover {
    background: #1d4ed8;
    transform: scale(1.015);
}
.primary-button:active {
    transform: scale(0.985);
}
.primary-button:disabled {
    opacity: 0.85;
    cursor: not-allowed;
}
</style>

<!-- ⭐ Firebase SDK -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, sendPasswordResetEmail, signOut }
    from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyClO8clBVgSHKx8jarNwC38oMtWRK0W8KE",
      authDomain: "getxh-42588.firebaseapp.com",
      projectId: "getxh-42588",
      storageBucket: "getxh-42588.firebasestorage.app",
      messagingSenderId: "170770122888",
      appId: "1:170770122888:web:7adcf91077d5695b06b73d"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    function normalizeEmail(value) {
        return String(value || "").trim().toLowerCase();
    }

    function saveSession(user, fallbackEmail = "") {
        const email = normalizeEmail(user?.email || fallbackEmail);
        localStorage.setItem("getxh_user_name", user?.displayName || "");
        localStorage.setItem("getxh_current_user_uid", user?.uid || "");
        localStorage.setItem("getxh_user_logged_in", "yes");
        localStorage.setItem("getxh_current_user", email);
    }

    onAuthStateChanged(auth, (user) => {
        if (!user) return;
        saveSession(user);
    });

    function clearLoginFields() {
        const emailInput = document.getElementById("email");
        const passwordInput = document.getElementById("password");
        if (emailInput) emailInput.value = "";
        if (passwordInput) passwordInput.value = "";
    }

    window.addEventListener("DOMContentLoaded", clearLoginFields);
    window.addEventListener("pageshow", clearLoginFields);

    // Login button handler
    window.loginNow = function () {
        let email = normalizeEmail(document.getElementById("email").value);
        let password = document.getElementById("password").value.trim();
        let errorBox = document.getElementById("errorBox");
        let loginBtn = document.getElementById("loginBtn");

        if (!email) {
            errorBox.textContent = "Email cannot be empty";
            errorBox.classList.remove("hidden");
            return;
        }

        if (!password) {
            errorBox.textContent = "Password cannot be empty";
            errorBox.classList.remove("hidden");
            return;
        }

        errorBox.classList.add("hidden");
        loginBtn.disabled = true;
        loginBtn.innerHTML = '<span class="inline-block h-4 w-4 rounded-full border-2 border-white/40 border-t-white animate-spin align-[-2px] mr-2"></span>Signing In...';

        signInWithEmailAndPassword(auth, email, password)
        .then(async (userCredential) => {
            const user = userCredential.user;
            saveSession(user, email);
            window.location.href = "Dashboard.html";
        })
        .catch((error) => {
            let msg = "Invalid email or password";
            if (error.code === "auth/user-not-found")       msg = "No account exists with this email";
            if (error.code === "auth/wrong-password")        msg = "Incorrect password";
            if (error.code === "auth/invalid-email")         msg = "Enter a valid email";
            if (error.code === "auth/invalid-credential")    msg = "Incorrect email or password";
            if (error.code === "auth/too-many-requests")     msg = "Too many attempts. Please try again in a moment";
            if (error.code === "auth/network-request-failed") msg = "Network error. Check your internet and try again";

            errorBox.textContent = msg;
            errorBox.classList.remove("hidden");
            loginBtn.disabled = false;
            loginBtn.textContent = "Sign In";
        });
    };

    // ── FORGOT PASSWORD ──
    window.openForgotPassword = function() {
        const emailVal = normalizeEmail(document.getElementById('email').value);
        if (emailVal) document.getElementById('resetEmail').value = emailVal;
        document.getElementById('forgotModal').classList.remove('hidden');
        document.getElementById('forgotModal').style.display = 'flex';
        document.getElementById('resetMsg').classList.add('hidden');
        document.getElementById('resetEmail').focus();
    };
    window.closeForgotPassword = function() {
        document.getElementById('forgotModal').classList.add('hidden');
        document.getElementById('forgotModal').style.display = 'none';
    };
    window.sendReset = async function() {
        const email = normalizeEmail(document.getElementById('resetEmail').value);
        const msg   = document.getElementById('resetMsg');
        const btn   = document.getElementById('resetBtn');
        if (!email) {
            msg.textContent = 'Please enter your email address.';
            msg.style.color = '#f87171';
            msg.classList.remove('hidden');
            return;
        }
        btn.disabled = true;
        btn.innerHTML = '<span class="inline-block h-4 w-4 rounded-full border-2 border-white/40 border-t-white animate-spin align-[-2px] mr-2"></span>Sending...';
        try {
            await sendPasswordResetEmail(auth, email);
            msg.textContent = '✓ Reset link sent! Check your email inbox.';
            msg.style.color = '#4ade80';
            msg.classList.remove('hidden');
            btn.textContent = 'Sent';
            setTimeout(() => window.closeForgotPassword(), 3000);
        } catch(e) {
            let errMsg = 'Something went wrong. Try again.';
            if (e.code === 'auth/user-not-found')  errMsg = 'No account found with this email.';
            if (e.code === 'auth/invalid-email')   errMsg = 'Enter a valid email address.';
            if (e.code === 'auth/too-many-requests') errMsg = 'Too many attempts. Please wait a moment.';
            msg.textContent = errMsg;
            msg.style.color = '#f87171';
            msg.classList.remove('hidden');
            btn.disabled = false;
            btn.textContent = 'Send Reset Link';
        }
    };
</script>

</head>

<body class="font-display text-[#0f172a]">

<div class="relative flex min-h-screen w-full flex-col items-center justify-center overflow-x-hidden">

<div class="px-4 flex flex-1 justify-center items-center py-10">
<div class="w-full max-w-md flex-col items-center">

<div class="flex flex-col items-center mb-8">
<h2 class="text-3xl font-bold tracking-[0.22em] text-[#2563eb]">GETXH</h2>
<p class="mt-3 text-sm text-slate-500">Sign in to continue to GETXH</p>
</div>

<div class="login-card w-full p-8 sm:p-9">

<h1 class="text-[#111827] text-3xl font-semibold tracking-tight text-center pb-8">Welcome Back</h1>

<div id="errorBox" class="hidden mb-4 text-red-600 font-medium text-center"></div>

<div class="flex flex-col gap-4">

<div class="flex flex-col">
<label class="text-[#111827] text-sm font-medium mb-2">Email</label>
<div class="form-input-container">
<input id="email" type="email" autocomplete="off" autocapitalize="none" spellcheck="false" readonly onfocus="this.removeAttribute('readonly');" class="form-input w-full rounded-xl border border-gray-300 bg-gray-50 h-12 px-4 text-sm text-slate-900 outline-none placeholder:text-slate-400 hover:border-slate-400 focus:border-[#2563eb] focus:bg-white focus:ring-4 focus:ring-blue-100" placeholder="you@example.com"/>
<span class="material-symbols-outlined">mail</span>
</div>
</div>

<div class="flex flex-col">
<label class="text-[#111827] text-sm font-medium mb-2">Password</label>
<div class="form-input-container">
<input id="password" type="password" autocomplete="new-password" autocapitalize="none" spellcheck="false" readonly onfocus="this.removeAttribute('readonly');" class="form-input w-full rounded-xl border border-gray-300 bg-gray-50 h-12 px-4 pr-12 text-sm text-slate-900 outline-none placeholder:text-slate-400 hover:border-slate-400 focus:border-[#2563eb] focus:bg-white focus:ring-4 focus:ring-blue-100" placeholder="Enter your password"/>
<span class="material-symbols-outlined">lock</span>
<div class="toggle-password" onclick="togglePassword()">
<span class="material-symbols-outlined">visibility</span>
</div>
</div>
</div>

</div>

<div class="mt-6 flex flex-col gap-4">
<button id="loginBtn" type="button" onclick="loginNow()" class="primary-button w-full h-12 text-white rounded-xl font-semibold">
    Sign In
</button>
</div>

<div class="mt-5 flex flex-col items-center justify-between gap-2 text-center sm:flex-row sm:text-left">
<a class="text-sm text-gray-500 transition-colors duration-200 hover:text-gray-700 cursor-pointer" onclick="openForgotPassword()">Forgot Password?</a>
<a class="text-sm font-medium text-blue-600 transition-colors duration-200 hover:text-blue-700" href="Registerpage.html">Create Account</a>
</div>

</div>
</div>
</div>

</div>


<!-- FORGOT PASSWORD MODAL -->
<div id="forgotModal"
     class="fixed inset-0 z-50 hidden items-end justify-center"
     style="background:rgba(0,0,0,0.7);backdrop-filter:blur(6px)"
     onclick="if(event.target===this)closeForgotPassword()">
  <div class="w-full max-w-md mx-auto rounded-t-3xl p-6 pb-10"
       style="background:linear-gradient(180deg,#0e1f3d 0%,#0a1628 100%);border-top:1px solid rgba(33,150,243,0.25)">
    <div class="flex justify-center mb-4">
      <div class="w-10 h-1 rounded-full" style="background:rgba(255,255,255,0.15)"></div>
    </div>
    <div class="w-12 h-12 rounded-2xl flex items-center justify-center mb-4"
         style="background:rgba(33,150,243,0.12);border:1px solid rgba(33,150,243,0.25)">
      <span class="material-symbols-outlined" style="color:#2196f3;font-size:22px">lock_reset</span>
    </div>
    <h2 class="text-white font-black text-lg mb-1">Reset Password</h2>
    <p class="text-gray-400 text-sm mb-5">Enter your email and we'll send you a reset link.</p>
    <input id="resetEmail" type="email" placeholder="Your email address"
           autocomplete="email"
           class="w-full px-4 py-3.5 rounded-xl text-sm text-white placeholder-gray-500 outline-none mb-3"
           style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12)"
           onkeydown="if(event.key==='Enter')sendReset()"/>
    <p id="resetMsg" class="hidden text-sm font-semibold mb-3"></p>
    <button id="resetBtn" onclick="sendReset()"
            class="w-full py-3.5 rounded-xl font-black text-sm text-white mb-3"
            style="background:linear-gradient(135deg,#1d4ed8,#2196f3);box-shadow:0 8px 24px rgba(33,150,243,0.3)">
      Send Reset Link
    </button>
    <button onclick="closeForgotPassword()"
            class="w-full py-3 rounded-xl font-bold text-sm text-gray-400"
            style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08)">
      Cancel
    </button>
  </div>
</div>

<script>
function togglePassword() {
    let p = document.getElementById("password");
    p.type = p.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
