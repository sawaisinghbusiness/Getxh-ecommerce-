<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
<link rel="icon" href="/GETXH WEB NEW LOGO.png" type="image/png"> />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment — GETXH</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #0f172a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #f1f5f9;
      -webkit-font-smoothing: antialiased;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }
    .card {
      background: #12161f;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 40px 32px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      position: relative;
    }
    .icon-wrap {
      width: 72px; height: 72px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 32px;
    }
    .icon-pending  { background: rgba(234,179,8,0.12);  border: 2px solid rgba(234,179,8,0.3);  }
    .icon-success  { background: rgba(34,197,94,0.12);  border: 2px solid rgba(34,197,94,0.3);  }
    .icon-failed   { background: rgba(239,68,68,0.12);  border: 2px solid rgba(239,68,68,0.3);  }

    .title { font-size: 22px; font-weight: 800; margin-bottom: 8px; }
    .subtitle { font-size: 14px; color: #64748b; line-height: 1.6; margin-bottom: 28px; }

    .payment-id-box {
      background: #0f172a;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 12px;
      font-family: monospace;
      color: #94a3b8;
      word-break: break-all;
      margin-bottom: 24px;
    }

    .spinner {
      width: 20px; height: 20px;
      border: 2px solid rgba(99,102,241,0.2);
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: inline-block;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .status-label {
      font-size: 13px;
      font-weight: 600;
      color: #94a3b8;
      margin-bottom: 24px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 14px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: opacity .2s, transform .1s;
    }
    .btn:hover  { opacity: 0.9; }
    .btn:active { transform: scale(0.99); }
    .btn-primary { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff; }
    .btn-outline { background: transparent; border: 1px solid rgba(255,255,255,0.1); color: #94a3b8; margin-top: 10px; }
  </style>
  <script>if("serviceWorker"in navigator){navigator.serviceWorker.getRegistrations().then(r=>{r.forEach(reg=>reg.unregister())});}</script>
</head>
<body>
  <div class="card">

    <div class="icon-wrap icon-pending" id="iconWrap">⏳</div>
    <p class="title" id="titleEl">Payment Submitted</p>
    <p class="subtitle" id="subtitleEl">Please wait while we verify your payment.<br>This usually takes a few seconds.</p>

    <div class="payment-id-box" id="pidBox">Fetching payment ID...</div>

    <p class="status-label" id="statusLabel">
      <span class="spinner"></span> Checking status...
    </p>

    <a class="btn btn-outline" href="/dashboard" id="dashBtn">Go to Dashboard</a>
  </div>

<script>
  const BACKEND   = "https://backend-for-payment-system-getxh-production.up.railway.app";

  // Get payment_id — from URL query param (Zerotize appends it) or localStorage
  const urlParams  = new URLSearchParams(window.location.search);
  const urlKeys    = [...urlParams.keys()];
  const payment_id = urlKeys.length > 0 ? urlKeys[0] : localStorage.getItem("gxpay_pending_id");

  document.getElementById("pidBox").textContent = payment_id ? `Payment ID: ${payment_id}` : "Payment ID not found";

  if (!payment_id) {
    document.getElementById("statusLabel").textContent = "Could not find payment ID.";
  } else {
    startPolling(payment_id);
  }

  function startPolling(pid) {
    let attempts = 0;
    const MAX    = 24; // 24 × 5s = 2 min max

    const interval = setInterval(async () => {
      attempts++;
      try {
        const res  = await fetch(`${BACKEND}/verify-payment`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ payment_id: pid })
        });
        const data = await res.json();
        const status = (data.status || "pending").toLowerCase();

        if (status === "success") {
          clearInterval(interval);
          localStorage.removeItem("gxpay_pending_id");
          localStorage.removeItem("gxpay_pending_email");
          showSuccess();
        } else if (status === "failed") {
          clearInterval(interval);
          showFailed();
        } else if (attempts >= MAX) {
          clearInterval(interval);
          showTimeout();
        }
      } catch (e) {
        if (attempts >= MAX) {
          clearInterval(interval);
          showTimeout();
        }
      }
    }, 5000);
  }

  function showSuccess() {
    document.getElementById("iconWrap").className   = "icon-wrap icon-success";
    document.getElementById("iconWrap").textContent = "✅";
    document.getElementById("titleEl").textContent  = "Payment Successful!";
    document.getElementById("subtitleEl").textContent = "Your wallet has been credited. Redirecting to dashboard...";
    document.getElementById("statusLabel").innerHTML = '<span style="color:#22c55e;font-weight:700;">✓ Verified</span>';
    const btn = document.getElementById("dashBtn");
    btn.className = "btn btn-primary";
    btn.textContent = "Go to Dashboard";
    setTimeout(() => window.location.replace("/dashboard"), 3000);
  }

  function showFailed() {
    document.getElementById("iconWrap").className   = "icon-wrap icon-failed";
    document.getElementById("iconWrap").textContent = "❌";
    document.getElementById("titleEl").textContent  = "Payment Failed";
    document.getElementById("subtitleEl").textContent = "Your payment could not be verified. Please try again or contact support.";
    document.getElementById("statusLabel").innerHTML = '<span style="color:#ef4444;font-weight:700;">Payment failed</span>';
    const btn = document.getElementById("dashBtn");
    btn.className = "btn btn-primary";
    btn.textContent = "Try Again";
    btn.href = "/wallet";
  }

  function showTimeout() {
    document.getElementById("subtitleEl").textContent = "Verification is taking longer than expected. Your balance will be updated once confirmed.";
    document.getElementById("statusLabel").innerHTML = '<span style="color:#f59e0b;font-weight:700;">⏳ Still processing...</span>';
  }
</script>
</body>
</html>
