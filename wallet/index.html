<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Wallet | GETXH</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"/>
  <style>
    :root { color-scheme: dark; }
    body { background: #0f172a; font-family: 'Inter', sans-serif; }

    .balance-card {
      background: linear-gradient(135deg, #1e3a5f 0%, #1a2744 60%, #0f1f3d 100%);
      border: 1px solid rgba(99,102,241,0.2);
      box-shadow: 0 24px 60px rgba(0,0,0,0.4);
    }
    .section-card {
      background: #12161f;
      border: 1px solid rgba(255,255,255,0.07);
    }
    .dark-field {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(148,163,184,0.15);
      transition: border-color 180ms, box-shadow 180ms;
    }
    .dark-field:focus {
      border-color: rgba(99,102,241,0.7);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
      outline: none;
      background: rgba(255,255,255,0.06);
    }
    .pay-btn {
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      box-shadow: 0 8px 24px rgba(99,102,241,0.35);
      transition: transform 150ms, box-shadow 150ms, opacity 150ms;
    }
    .pay-btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 12px 30px rgba(99,102,241,0.4); }
    .pay-btn:active:not(:disabled) { transform: scale(0.99); }
    .pay-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .chip {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      transition: border-color 150ms, background 150ms, transform 150ms;
    }
    .chip:hover { border-color: rgba(99,102,241,0.5); background: rgba(99,102,241,0.1); transform: translateY(-1px); }
    .chip.selected { border-color: #6366f1; background: rgba(99,102,241,0.15); }

    @keyframes shimmer {
      0% { background-position: -400px 0 }
      100% { background-position: 400px 0 }
    }
    .skeleton {
      background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.09) 50%, rgba(255,255,255,0.04) 75%);
      background-size: 800px 100%;
      animation: shimmer 1.4s infinite linear;
      border-radius: 8px;
    }

    /* Verify Payment Popup */
    .verify-popup {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 999;
      backdrop-filter: blur(4px);
    }
    .verify-popup.active { display: flex; }
    .verify-popup-box {
      background: #12161f;
      border: 1px solid rgba(99,102,241,0.25);
      box-shadow: 0 24px 60px rgba(0,0,0,0.5);
      border-radius: 24px;
      padding: 32px 28px;
      text-align: center;
      width: 260px;
    }
    .verify-spinner {
      border: 3px solid rgba(255,255,255,0.08);
      border-top: 3px solid #6366f1;
      border-radius: 50%;
      width: 44px; height: 44px;
      animation: spin 0.9s linear infinite;
      margin: 0 auto 18px;
    }
    @keyframes spin {
      0%   { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
  <script>if('serviceWorker' in navigator){navigator.serviceWorker.getRegistrations().then(r=>{r.forEach(reg=>reg.unregister())})}</script>
</head>

<body class="text-white min-h-screen">

<!-- Header -->
<div class="sticky top-0 z-40 flex items-center gap-3 px-4 py-4 border-b border-white/8 bg-[#0f172a]">
  <button onclick="window.location.href='/dashboard'"
    class="w-10 h-10 rounded-xl flex items-center justify-center bg-white/5 hover:bg-white/10 transition-colors">
    <span class="material-symbols-outlined text-xl">arrow_back_ios_new</span>
  </button>
  <div>
    <h1 class="text-lg font-black">Wallet</h1>
    <p class="text-xs text-indigo-400">GETXH.IN</p>
  </div>
</div>

<main class="mx-auto w-full max-w-lg px-4 py-5 pb-24">

  <!-- Balance Card -->
  <section class="balance-card rounded-3xl p-6 mb-5">
    <p class="text-xs uppercase tracking-widest text-indigo-300/70 mb-2">Available Balance</p>
    <h2 id="walletBalance" class="text-5xl font-black tracking-tight">
      <span class="skeleton inline-block w-36 h-12 rounded-xl">&nbsp;</span>
    </h2>
    <p id="walletEmail" class="text-sm text-indigo-200/60 mt-2">Loading...</p>


  </section>

  <!-- Add Funds via UPI -->
  <section id="addFundsSection" class="section-card rounded-3xl p-6 mb-5">
    <h3 class="text-lg font-black mb-1">Add Funds via UPI</h3>
    <p class="text-sm text-gray-400 mb-5">Scan the QR code and complete payment. Then enter UTR and amount to verify.</p>

    <!-- Notice -->
    <div id="walletNotice" class="hidden mb-4 rounded-2xl px-4 py-3 text-sm font-semibold"></div>

    <!-- QR Code -->
    <div class="flex flex-col items-center mb-6">
      <div class="rounded-2xl p-3 mb-2" style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1)">
        <img src="/payment-qr.png" alt="UPI QR Code"
          class="w-44 h-44 rounded-xl object-contain"
          style="image-rendering:crisp-edges"/>
      </div>
      <p class="text-xs font-bold text-indigo-300 tracking-widest uppercase mt-1">Scan &amp; Pay</p>
    </div>

    <!-- UTR Input -->
    <div class="mb-3">
      <label class="text-xs font-black uppercase tracking-widest text-gray-500 mb-2 block">UTR / Transaction ID</label>
      <input id="utrInput" type="text" placeholder="Enter 12-digit UTR number"
        class="dark-field w-full rounded-2xl px-4 py-3.5 text-white text-sm"
        oninput="checkVerifyBtn()"/>
    </div>

    <!-- Amount Input -->
    <div class="mb-5">
      <label class="text-xs font-black uppercase tracking-widest text-gray-500 mb-2 block">Amount Paid (₹)</label>
      <input id="amountInput" type="number" min="1" placeholder="Enter amount you paid"
        class="dark-field w-full rounded-2xl px-4 py-3.5 text-white text-sm"
        oninput="checkVerifyBtn()"/>
    </div>

    <!-- Verify Button -->
    <button id="verifyBtn" onclick="verifyPayment()" disabled
      class="pay-btn w-full rounded-2xl py-3.5 font-black text-sm text-white">
      Verify Payment
    </button>
  </section>

  <!-- Transaction History -->
  <section class="section-card rounded-3xl p-6">
    <h3 class="text-base font-black mb-4">Recent Transactions</h3>
    <div id="txList">
      <div class="skeleton h-14 w-full mb-3 rounded-2xl"></div>
      <div class="skeleton h-14 w-full rounded-2xl"></div>
    </div>
  </section>

</main>

<!-- Verify Payment Popup -->
<div id="verifyPopup" class="verify-popup">
  <div class="verify-popup-box">
    <div class="verify-spinner"></div>
    <p class="text-white font-bold text-sm">Verifying your payment...</p>
    <p class="text-gray-500 text-xs mt-1">Please wait a moment</p>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyClO8clBVgSHKx8jarNwC38oMtWRK0W8KE",
  authDomain: "getxh-42588.firebaseapp.com",
  projectId: "getxh-42588",
  storageBucket: "getxh-42588.firebasestorage.app",
  messagingSenderId: "170770122888",
  appId: "1:170770122888:web:c76e847e4d19a565ea7c77"
};

const BACKEND = "https://backend-for-email-verification-code-1.onrender.com";

initializeApp(firebaseConfig);
const auth = getAuth();

let currentUser = null;

// Wake up backend immediately
fetch(`${BACKEND}/ping`).catch(()=>{});

function renderTxList(txs) {
  const el = document.getElementById("txList");
  if (!txs.length) {
    el.innerHTML = '<p class="text-sm text-gray-500 text-center py-6">No transactions yet.</p>';
    return;
  }
  el.innerHTML = txs.map(t => {
    const date  = t.createdAt ? new Date(t.createdAt).toLocaleDateString("en-IN", {day:"2-digit",month:"short",year:"numeric"}) : "—";
    const color = t.status === "success" ? "text-green-400" : t.status === "failed" ? "text-red-400" : "text-yellow-400";
    const badge = t.status === "success" ? "bg-green-500/10 border-green-500/20" : t.status === "failed" ? "bg-red-500/10 border-red-500/20" : "bg-yellow-500/10 border-yellow-500/20";
    return `<div class="flex items-center justify-between bg-white/3 border border-white/6 rounded-2xl px-4 py-3 mb-3">
      <div><p class="text-sm font-bold">Wallet Recharge</p><p class="text-xs text-gray-500">${date}</p></div>
      <div class="text-right">
        <p class="text-sm font-black">₹${t.amount.toFixed(2)}</p>
        <span class="text-xs font-bold px-2 py-0.5 rounded-lg border ${badge} ${color}">${t.status}</span>
      </div>
    </div>`;
  }).join("");
}

onAuthStateChanged(auth, user => {
  if (!user) { window.location.replace("/"); return; }
  currentUser = user;
  document.getElementById("walletEmail").textContent = user.email;

  // Show cached data instantly
  const cachedBal = localStorage.getItem("gx_wallet_bal");
  const cachedTxs = localStorage.getItem("gx_wallet_txs_" + user.email);
  if (cachedBal) document.getElementById("walletBalance").textContent = cachedBal;
  if (cachedTxs) { try { renderTxList(JSON.parse(cachedTxs)); } catch {} }

  // Fetch fresh in background
  loadBalance(user.email);
  loadTransactions(user.email);
});

async function loadBalance(email) {
  try {
    const res  = await fetch(`${BACKEND}/get-balance?email=${encodeURIComponent(email)}`);
    const data = await res.json();
    const val  = "₹" + (data.balance || 0).toFixed(2);
    document.getElementById("walletBalance").textContent = val;
    localStorage.setItem("gx_wallet_bal", val);
  } catch {
    if (!localStorage.getItem("gx_wallet_bal"))
      document.getElementById("walletBalance").textContent = "₹0.00";
  }
}

async function loadTransactions(email) {
  try {
    const res  = await fetch(`${BACKEND}/get-transactions?email=${encodeURIComponent(email)}`);
    const data = await res.json();
    const txs  = data.transactions || [];
    renderTxList(txs);
    localStorage.setItem("gx_wallet_txs_" + email, JSON.stringify(txs));
  } catch {
    if (!localStorage.getItem("gx_wallet_txs_" + email))
      document.getElementById("txList").innerHTML = '<p class="text-sm text-gray-500 text-center py-6">Failed to load transactions.</p>';
  }
}

window.checkVerifyBtn = function() {
  const utr    = document.getElementById("utrInput").value.trim();
  const amount = document.getElementById("amountInput").value.trim();
  document.getElementById("verifyBtn").disabled = !(utr && amount);
};

window.verifyPayment = async function() {
  if (!currentUser) return;
  const utr    = document.getElementById("utrInput").value.trim();
  const amount = parseFloat(document.getElementById("amountInput").value);
  const notice = document.getElementById("walletNotice");
  const btn    = document.getElementById("verifyBtn");

  notice.className = "hidden mb-4 rounded-2xl px-4 py-3 text-sm font-semibold";

  if (!utr) {
    notice.className = "flex mb-4 rounded-2xl px-4 py-3 text-sm font-semibold bg-red-500/10 border border-red-500/20 text-red-400";
    notice.textContent = "Please enter your UTR / Transaction ID.";
    return;
  }
  if (!amount || amount < 1) {
    notice.className = "flex mb-4 rounded-2xl px-4 py-3 text-sm font-semibold bg-red-500/10 border border-red-500/20 text-red-400";
    notice.textContent = "Please enter the amount you paid.";
    return;
  }

  btn.disabled = true;
  document.getElementById("verifyPopup").classList.add("active");

  try {
    const res  = await fetch(`${BACKEND}/verify-payment`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ utr, amount, email: currentUser.email })
    });
    const data = await res.json();

    document.getElementById("verifyPopup").classList.remove("active");

    if (data.success) {
      notice.className = "flex mb-4 rounded-2xl px-4 py-3 text-sm font-semibold bg-green-500/10 border border-green-500/20 text-green-400";
      notice.textContent = "Payment verified! Balance will be credited shortly.";
      document.getElementById("utrInput").value = "";
      document.getElementById("amountInput").value = "";
      loadBalance(currentUser.email);
    } else {
      throw new Error(data.message || "Could not verify payment. Please try again or contact support.");
    }
  } catch (e) {
    document.getElementById("verifyPopup").classList.remove("active");
    notice.className = "flex mb-4 rounded-2xl px-4 py-3 text-sm font-semibold bg-red-500/10 border border-red-500/20 text-red-400";
    notice.textContent = e.message || "Something went wrong. Try again.";
  } finally {
    btn.disabled = false;
    checkVerifyBtn();
  }
};
</script>
</body>
</html>
