<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
<link rel="icon" href="/GETXH WEB NEW LOGO.png" type="image/png"> />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify OTP - GETXH</title>

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: white;
    }

    .card {
      background: #1e293b;
      padding: 30px;
      border-radius: 12px;
      width: 320px;
      text-align: center;
    }

    .email-hint {
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 16px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      border-radius: 8px;
      border: none;
      outline: none;
      font-size: 16px;
      text-align: center;
      letter-spacing: 4px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 20px;
      background: #6366f1;
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
    }

    button:hover:not(:disabled) { background: #4f46e5; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }

    .back {
      margin-top: 16px;
      font-size: 13px;
      color: #64748b;
    }

    .back a { color: #818cf8; text-decoration: none; }
    .back a:hover { text-decoration: underline; }

    .error   { color: #ef4444; margin-top: 12px; font-size: 14px; }
    .success { color: #22c55e; margin-top: 12px; font-size: 14px; }
  </style>
<script>if("serviceWorker"in navigator){navigator.serviceWorker.getRegistrations().then(r=>{r.forEach(reg=>reg.unregister())});}</script>
</head>

<body>

  <div class="card">
    <h2>Enter OTP</h2>
    <p class="email-hint" id="emailHint"></p>

    <input type="text" id="otp" placeholder="_ _ _ _ _ _"
           maxlength="6" inputmode="numeric" autocomplete="one-time-code" />

    <button id="verifyBtn" onclick="verifyOTP()">Verify OTP</button>

    <div id="msg"></div>

    <div class="back">
      <a href="/forgot-password">← Resend OTP</a>
    </div>
  </div>

<script>
  const params = new URLSearchParams(window.location.search);
  const email  = params.get("email") || "";
  const type   = params.get("type")  || "reset";

  if (!email) window.location.href = "/forgot-password";

  document.getElementById("emailHint").textContent = `OTP sent to ${email}`;

  async function verifyOTP() {
    const otp = document.getElementById("otp").value.trim();
    const msg = document.getElementById("msg");
    const btn = document.getElementById("verifyBtn");

    msg.innerHTML = "";

    if (!otp || otp.length < 4) {
      msg.innerHTML = "<div class='error'>Enter the OTP from your email</div>";
      return;
    }

    btn.disabled    = true;
    btn.textContent = "Verifying…";

    try {
      const res = await fetch("https://backend-for-email-verification-code-production-61a3.up.railway.app/verify-otp", {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify({ email, otp, type })
      });

      const data = await res.json();

      if (data.success) {
        msg.innerHTML   = "<div class='success'>OTP Verified!</div>";
        btn.textContent = "Verified ✓";
        setTimeout(() => {
          window.location.href = `/reset-password?email=${encodeURIComponent(email)}`;
        }, 1000);
      } else {
        msg.innerHTML   = `<div class='error'>${data.error || data.message || "Invalid OTP"}</div>`;
        btn.disabled    = false;
        btn.textContent = "Verify OTP";
      }

    } catch (err) {
      msg.innerHTML   = "<div class='error'>Cannot reach server. Try again.</div>";
      btn.disabled    = false;
      btn.textContent = "Verify OTP";
    }
  }
</script>

</body>
</html>
