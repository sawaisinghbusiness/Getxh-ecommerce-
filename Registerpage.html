<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>GETXH - Register</title>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

<style>
.material-symbols-outlined {
    font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 20;
    font-size:20px;
}
body {
    font-family:'Inter',sans-serif;
    background:linear-gradient(180deg,#f5f7fb 0%,#eef2ff 100%);
}
.form-input-container {
    position:relative;
}
.form-input-container .material-symbols-outlined {
    position:absolute;
    left:1rem;
    top:50%;
    transform:translateY(-50%);
    color:#94a3b8;
    pointer-events:none;
    transition:color 0.25s ease;
}
.form-input-container .form-input {
    padding-left:3rem;
    transition:border-color 0.25s ease, box-shadow 0.25s ease, background-color 0.25s ease;
}
.form-input-container:focus-within .material-symbols-outlined {
    color:#2563eb;
}
.toggle-password {
    position:absolute;
    right:0.75rem;
    top:50%;
    transform:translateY(-50%);
    color:#94a3b8;
    cursor:pointer;
    width:2rem;
    height:2rem;
    border-radius:9999px;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:background-color 0.2s ease, color 0.2s ease, transform 0.2s ease;
}
.toggle-password:hover {
    color:#334155;
    background:#f1f5f9;
}
.toggle-password:active {
    transform:translateY(-50%) scale(0.96);
}
.toggle-password .material-symbols-outlined {
    pointer-events:auto;
}
.signup-card {
    border:1px solid #e5e7eb;
    border-radius:1rem;
    background:rgba(255,255,255,0.96);
    box-shadow:0 24px 60px rgba(15,23,42,0.10);
    transition:transform 0.3s ease, box-shadow 0.3s ease;
}
.signup-card:hover {
    transform:translateY(-4px) scale(1.01);
    box-shadow:0 28px 70px rgba(15,23,42,0.12);
}
.primary-button {
    background:#2563eb;
    box-shadow:0 14px 30px rgba(37,99,235,0.22);
    transition:background-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
}
.primary-button:hover {
    background:#1d4ed8;
    transform:scale(1.015);
}
.primary-button:active {
    transform:scale(0.985);
}
.primary-button:disabled {
    opacity:0.85;
    cursor:not-allowed;
}
.success-state {
    display:none;
}
.success-state.active {
    display:block;
}
.form-state.hidden {
    display:none;
}
</style>
</head>

<body class="text-[#0f172a]">

<div class="min-h-screen flex items-center justify-center px-4 py-10">
<div class="w-full max-w-[380px]">

<div id="formState" class="signup-card form-state p-8 sm:p-9">
<div class="text-center mb-8">
<p class="text-3xl font-bold tracking-[0.22em] text-[#2563eb]">GETXH</p>
<h1 class="mt-4 text-3xl font-semibold tracking-tight text-[#111827]">Create Account</h1>
<p class="mt-2 text-sm text-slate-500">Start growing your Instagram with GETXH</p>
</div>

<div id="errorBox" class="hidden rounded-xl border border-red-100 bg-red-50 px-4 py-3 text-red-600 text-center text-sm font-medium mb-4"></div>

<div class="flex flex-col gap-4">
<div class="flex flex-col">
<label class="text-sm font-medium text-[#111827] mb-2">Full Name</label>
<div class="form-input-container">
<input id="name" type="text" autocomplete="off" autocapitalize="words" spellcheck="false" readonly onfocus="this.removeAttribute('readonly');" class="form-input w-full rounded-xl border border-gray-300 bg-gray-50 h-12 px-4 text-sm text-slate-900 outline-none placeholder:text-slate-400 hover:border-slate-400 focus:border-[#2563eb] focus:bg-white focus:ring-4 focus:ring-blue-100" placeholder="Your full name"/>
<span class="material-symbols-outlined">person</span>
</div>
</div>

<div class="flex flex-col">
<label class="text-sm font-medium text-[#111827] mb-2">Email</label>
<div class="form-input-container">
<input id="email" type="email" autocomplete="off" autocapitalize="none" spellcheck="false" readonly onfocus="this.removeAttribute('readonly');" class="form-input w-full rounded-xl border border-gray-300 bg-gray-50 h-12 px-4 text-sm text-slate-900 outline-none placeholder:text-slate-400 hover:border-slate-400 focus:border-[#2563eb] focus:bg-white focus:ring-4 focus:ring-blue-100" placeholder="you@example.com"/>
<span class="material-symbols-outlined">mail</span>
</div>
</div>

<div class="flex flex-col">
<label class="text-sm font-medium text-[#111827] mb-2">Password</label>
<div class="form-input-container">
<input id="password" type="password" autocomplete="new-password" autocapitalize="none" spellcheck="false" readonly onfocus="this.removeAttribute('readonly');" class="form-input w-full rounded-xl border border-gray-300 bg-gray-50 h-12 px-4 pr-12 text-sm text-slate-900 outline-none placeholder:text-slate-400 hover:border-slate-400 focus:border-[#2563eb] focus:bg-white focus:ring-4 focus:ring-blue-100" placeholder="Create password"/>
<span class="material-symbols-outlined">lock</span>
<div class="toggle-password" onclick="togglePass('password', this)">
<span class="material-symbols-outlined">visibility</span>
</div>
</div>
</div>

<div class="flex flex-col">
<label class="text-sm font-medium text-[#111827] mb-2">Confirm Password</label>
<div class="form-input-container">
<input id="confirmPassword" type="password" autocomplete="new-password" autocapitalize="none" spellcheck="false" readonly onfocus="this.removeAttribute('readonly');" class="form-input w-full rounded-xl border border-gray-300 bg-gray-50 h-12 px-4 pr-12 text-sm text-slate-900 outline-none placeholder:text-slate-400 hover:border-slate-400 focus:border-[#2563eb] focus:bg-white focus:ring-4 focus:ring-blue-100" placeholder="Re-enter password"/>
<span class="material-symbols-outlined">lock</span>
<div class="toggle-password" onclick="togglePass('confirmPassword', this)">
<span class="material-symbols-outlined">visibility</span>
</div>
</div>
</div>

<label class="flex items-start gap-3 pt-1 cursor-pointer">
<input id="terms" type="checkbox" class="mt-0.5 h-4 w-4 rounded border-gray-300 text-[#2563eb] focus:ring-[#2563eb]"/>
<span class="text-xs leading-5 text-slate-500">I agree to the Terms and Conditions</span>
</label>
</div>

<button id="registerBtn" class="primary-button mt-6 w-full h-12 text-white font-semibold rounded-xl">
Create Account
</button>

<div class="text-center mt-6">
<a href="index.html" class="text-sm text-slate-600">
Already have an account? <span class="text-[#2563eb] font-semibold">Sign In</span>
</a>
</div>
</div>

<div id="successState" class="signup-card success-state p-8 sm:p-9 text-center">
<p class="text-3xl font-bold tracking-[0.22em] text-[#2563eb]">GETXH</p>
<div class="mt-6 mx-auto flex h-14 w-14 items-center justify-center rounded-full bg-blue-50 text-[#2563eb]">
<span class="material-symbols-outlined">check</span>
</div>
<h2 class="mt-5 text-2xl font-semibold tracking-tight text-[#111827]">Account Created</h2>
<p class="mt-2 text-sm text-slate-500">Your GETXH account has been created</p>
<button id="continueBtn" class="primary-button mt-8 w-full h-12 text-white font-semibold rounded-xl">
Continue
</button>
</div>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyClO8clBVgSHKx8jarNwC38oMtWRK0W8KE",
  authDomain: "getxh-42588.firebaseapp.com",
  projectId: "getxh-42588",
  storageBucket: "getxh-42588.firebasestorage.app",
  messagingSenderId: "170770122888",
  appId: "1:170770122888:web:7adcf91077d5695b06b73d"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const registerBtn = document.getElementById("registerBtn");
const continueBtn = document.getElementById("continueBtn");
const errorBox = document.getElementById("errorBox");
const formState = document.getElementById("formState");
const successState = document.getElementById("successState");

function normalizeEmail(value) {
    return String(value || "").trim().toLowerCase();
}

function saveSession(user, fallbackName = "", fallbackEmail = "") {
    const email = normalizeEmail(user?.email || fallbackEmail);
    localStorage.setItem("getxh_user_logged_in", "yes");
    localStorage.setItem("getxh_current_user", email);
    localStorage.setItem("getxh_current_user_uid", user?.uid || "");
    localStorage.setItem("getxh_user_name", user?.displayName || fallbackName || "");
}

onAuthStateChanged(auth, (user) => {
    if (!user) return;
    saveSession(user);
});

function clearRegisterFields() {
    ["name", "email", "password", "confirmPassword"].forEach((id) => {
        const el = document.getElementById(id);
        if (el) el.value = "";
    });
}

window.addEventListener("DOMContentLoaded", clearRegisterFields);
window.addEventListener("pageshow", clearRegisterFields);

registerBtn.onclick = async function () {
    const name = document.getElementById("name").value.trim();
    const email = normalizeEmail(document.getElementById("email").value);
    const pass = document.getElementById("password").value.trim();
    const cpass = document.getElementById("confirmPassword").value.trim();
    const terms = document.getElementById("terms").checked;

    if (!name) return show("Name cannot be empty");
    if (!email) return show("Email cannot be empty");
    if (!email.includes("@")) return show("Enter a valid email");
    if (pass.length < 6) return show("Password must be at least 6 characters");
    if (pass !== cpass) return show("Passwords do not match");
    if (!terms) return show("Please accept the Terms and Conditions");

    errorBox.classList.add("hidden");
    registerBtn.disabled = true;
    registerBtn.innerHTML = '<span class="inline-block h-4 w-4 rounded-full border-2 border-white/40 border-t-white animate-spin align-[-2px] mr-2"></span>Creating Account...';

    let userCred;

    try {
        userCred = await createUserWithEmailAndPassword(auth, email, pass);
        await updateProfile(userCred.user, { displayName: name });
    } catch (error) {
        let msg = "Registration failed.";

        if (error.code === "auth/email-already-in-use") {
            msg = "Email already registered. Please login.";
        } else if (error.code === "auth/weak-password") {
            msg = "Password must be at least 6 characters.";
        } else if (error.code === "auth/invalid-email") {
            msg = "Enter a valid email address.";
        }

        show(msg);
        registerBtn.disabled = false;
        registerBtn.textContent = "Create Account";
        return;
    }

    try {
        await setDoc(doc(db, "Users", userCred.user.uid), {
            Name: name,
            Email: email,
            TotalOrders: 0,
            Balance: 0,
            TotalSpent: 0
        });
    } catch (e) {
        console.warn("Firestore write failed, continuing");
    }

    saveSession(userCred.user, name, email);

    formState.classList.add("hidden");
    successState.classList.add("active");
};

continueBtn.onclick = function () {
    window.location.href = "Dashboard.html";
};

function show(msg){
    errorBox.textContent = msg;
    errorBox.classList.remove("hidden");
}
</script>

<script>
function togglePass(id, el){
    const input = document.getElementById(id);
    const icon = el.querySelector(".material-symbols-outlined");
    const visible = input.type === "password";
    input.type = visible ? "text" : "password";
    icon.textContent = visible ? "visibility_off" : "visibility";
}
</script>

</body>
</html>
