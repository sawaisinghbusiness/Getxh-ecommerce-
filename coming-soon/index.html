<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
<link rel="icon" href="/GETXH WEB NEW LOGO.png" type="image/png"> />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coming Soon — GETXH</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Plus Jakarta Sans', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0d0f14;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .wrap {
      position: relative;
      width: 100%;
      max-width: 400px;
    }

    .brand {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 28px;
    }
    .brand-logo-wrap {
      display: inline-flex;
      mix-blend-mode: screen;
    }
    .brand-logo-wrap img {
      height: 90px;
      width: auto;
      display: block;
      filter: invert(1) hue-rotate(180deg);
    }

    .card {
      background: #12161f;
      border: 1px solid transparent;
      border-radius: 16px;
      padding: 32px;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 16px;
      padding: 1px;
      background: radial-gradient(
        transparent, transparent,
        #FF007F, #39FF14, #00FFFF,
        transparent, transparent
      );
      background-size: 300% 300%;
      animation: shine-pulse 6s linear infinite;
      -webkit-mask:
        linear-gradient(#fff 0 0) content-box,
        linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
      z-index: 0;
    }
    @keyframes shine-pulse {
      0%   { background-position: 0% 0%; }
      50%  { background-position: 100% 100%; }
      100% { background-position: 0% 0%; }
    }

    /* status pill */
    .status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px 4px 8px;
      border-radius: 6px;
      background: rgba(99,102,241,.08);
      border: 1px solid rgba(99,102,241,.2);
      margin-bottom: 24px;
    }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #818cf8;
      flex-shrink: 0;
      animation: blink 2.4s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
    .status-label {
      font-size: 11px;
      font-weight: 600;
      color: #818cf8;
      letter-spacing: 0.04em;
    }

    .heading {
      font-size: 28px;
      font-weight: 800;
      color: #f8fafc;
      letter-spacing: -0.5px;
      line-height: 1.2;
      margin-bottom: 6px;
    }

    /* shiny badge */
    @property --gradient-angle {
      syntax: "<angle>";
      initial-value: 0deg;
      inherits: false;
    }
    @property --gradient-percent {
      syntax: "<percentage>";
      initial-value: 5%;
      inherits: false;
    }
    @property --gradient-shine {
      syntax: "<color>";
      initial-value: white;
      inherits: false;
    }

    .badge {
      --bg: #0a0014;
      --bg-subtle: #110020;
      --fg: #c084fc;
      --highlight: #a855f7;
      --highlight-subtle: #e9d5ff;
      --duration: 4s;
      --shadow-size: 2px;
      --transition: 800ms cubic-bezier(0.25, 1, 0.5, 1);

      isolation: isolate;
      position: relative;
      overflow: hidden;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 6px 14px;
      margin: 14px 0 20px;
      border-radius: 360px;
      border: 1px solid transparent;
      cursor: default;
      color: var(--fg);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      background:
        linear-gradient(var(--bg), var(--bg)) padding-box,
        conic-gradient(
          from calc(var(--gradient-angle) - 0deg),
          transparent,
          var(--highlight) var(--gradient-percent),
          var(--gradient-shine) calc(var(--gradient-percent) * 2),
          var(--highlight) calc(var(--gradient-percent) * 3),
          transparent calc(var(--gradient-percent) * 4)
        ) border-box;
      box-shadow: inset 0 0 0 1px var(--bg-subtle);
      animation: gradient-angle var(--duration) linear infinite;
    }

    .badge::after {
      content: '';
      pointer-events: none;
      position: absolute;
      inset-inline-start: 50%;
      inset-block-start: 50%;
      translate: -50% -50%;
      width: 100%;
      aspect-ratio: 1;
      background: linear-gradient(-50deg, transparent, var(--highlight), transparent);
      mask-image: radial-gradient(circle at bottom, transparent 40%, black);
      opacity: 0.4;
      z-index: -1;
      animation: shimmer var(--duration) linear infinite;
    }

    .badge-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #a855f7;
      flex-shrink: 0;
    }

    @keyframes gradient-angle { to { --gradient-angle: 360deg; } }
    @keyframes shimmer { to { rotate: 360deg; } }

    .body-text {
      font-size: 14px;
      line-height: 1.7;
      color: #ffffff;
      margin-bottom: 28px;
    }

    .divider {
      height: 1px;
      background: #1e2638;
      margin-bottom: 24px;
    }

    /* rocket icon area */
    .icon-area {
      display: flex;
      justify-content: center;
      margin-bottom: 24px;
    }
    .icon-circle {
      width: 64px; height: 64px;
      border-radius: 18px;
      background: rgba(99,102,241,.12);
      border: 1px solid rgba(99,102,241,.25);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
    }

    .btn-home {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 14px 20px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-family: inherit;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
      letter-spacing: 0.01em;
    }
    .btn-home:hover  { opacity: 0.9; }
    .btn-home:active { transform: scale(0.99); }

    .footnote {
      margin-top: 20px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .footnote-line {
      flex: 1;
      height: 1px;
      background: #1a2030;
    }
    .footnote-text {
      font-size: 11px;
      color: #ffffff;
      font-weight: 500;
      white-space: nowrap;
    }
  </style>
<script>if("serviceWorker"in navigator){navigator.serviceWorker.getRegistrations().then(r=>{r.forEach(reg=>reg.unregister())});}</script>
</head>
<body>
  <div class="wrap">

    <div class="brand">
      <div class="brand-logo-wrap">
        <img src="/getxh new logo.png" alt="GETXH" />
      </div>
    </div>

    <div class="card">

      <p class="heading">Coming Soon</p>

      <div class="badge">
        <div class="badge-dot"></div>
        <span>Feature under development</span>
      </div>

      <p class="body-text">
        This feature is <strong>currently being built</strong>.<br>
        We're working hard to bring it to you.<br>
        Stay tuned for updates!
      </p>

      <div class="divider"></div>

      <a class="btn-home" href="/dashboard">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        Back to Dashboard
      </a>


    </div>
  </div>
</body>
</html>
